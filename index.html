<!doctype html>
<html lang="en">
  <head>
    <script>
      // Ultra-early safety check for fetch overwrite
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { console.warn('Blocked attempt to overwrite window.fetch'); },
            configurable: true,
            enumerable: true
          });
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arogya Medicare - Trusted Healthcare</title>
  </head>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
